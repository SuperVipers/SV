<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vipers</title>

<link rel="icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
}

/* FIX: prevents horizontal scroll bugs on mobile */
html, body{
    width:100%;
    height:100%;
}

/* WELCOME */
.welcome{
    position:fixed;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:clamp(2rem,5vw,4rem);
    font-weight:900;
    letter-spacing:4px;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
    z-index:100;

    background:rgba(0,0,0,0.6);
    padding:12px 30px;
    border-radius:12px;
    backdrop-filter:blur(8px);
    text-align:center;
    max-width:90%;
}

/* CONTAINER */
.container{
    display:flex;
    width:100vw;
    height:100vh;
}

/* SIDES */
.side{
    flex:1;
    position:relative;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.side:first-child{
    border-right:3px solid rgba(255,255,255,0.8);
}

.cvw94{
    background-image:url("mil1.png");
}

.supervipers{
    background-image:url("sv5.png");
}

/* OVERLAY */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BUTTON (desktop) */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:280px;
    height:80px;

    text-decoration:none;
    color:white;
    font-size:2rem;
    font-weight:900;

    border:3px solid white;
    border-radius:12px;

    backdrop-filter:blur(6px);
    transition:.3s;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* hover only for devices that support it */
@media (hover:hover){
    .btn:hover{
        background:red;
        border-color:red;
        transform:scale(1.05);
    }
}

/* MOBILE */
@media(max-width:768px){

    body{
        overflow:auto;
    }

    .welcome{
        top:15px;
        font-size:1.8rem;
        letter-spacing:2px;
        padding:10px 18px;
    }

    .container{
        flex-direction:column;
        height:100vh;
    }

    .side{
        height:50vh;
        background-attachment:scroll;
    }

    .side:first-child{
        border-right:none;
        border-bottom:3px solid rgba(255,255,255,0.8);
    }

    .btn{
        width:220px;
        height:65px;
        font-size:1.3rem;
        border-width:2px;
    }
}

/* very small phones */
@media(max-width:400px){
    .btn{
        width:200px;
        height:60px;
        font-size:1.1rem;
    }

    .welcome{
        font-size:1.5rem;
    }
}
</style>
</head>

<body>

<h1 class="welcome">Welcome</h1>

<div class="container">

    <div class="side cvw94">
        <div class="overlay">
            <a href="mil.html" class="btn">CVW-94</a>
        </div>
    </div>

    <div class="side supervipers">
        <div class="overlay">
            <a href="demo.html" class="btn">SuperVipers</a>
        </div>
    </div>

</div>

</body>
</html>
